name: Deploy App
 
on:
  push:
    branches: [ "main" ]
 
jobs:
  build-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v3
 
      - name: Install dependencies
        run: npm install
 
      - name: Build app
        run: npm run build
 
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
``